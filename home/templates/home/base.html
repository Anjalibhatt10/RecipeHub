<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RecipeHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/home/">
            🍽️ RecipeHub
        </a>

        <div>


            {% if request.user.is_authenticated %}

<a href="/home/" class="btn btn-outline-light me-2">
    Home
</a>

{% if request.user.profile.role == "Creator" %}

<a href="/receipes/" class="btn btn-success me-2">
    Add Recipe
</a>

<a href="/my-recipes/" class="btn btn-warning me-2">
    My Recipes
</a>

{% endif %}

<a href="/accounts/logout/" class="btn btn-danger">
    Logout
</a>

{% else %}

<a href="/accounts/login/" class="btn btn-primary me-2">
    Login
</a>

<a href="/accounts/register/" class="btn btn-success">
    Register
</a>

{% endif %}

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block start %}

    {% endblock %}

</div>

</body>
</html>
