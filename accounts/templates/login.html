<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RecipeHub | Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
width:420px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
color:white;
box-shadow:0 8px 30px rgba(0,0,0,.25);
}

.logo{
font-size:60px;
text-align:center;
margin-bottom:10px;
}

h1{
text-align:center;
margin-bottom:8px;
}

.subtitle{
text-align:center;
margin-bottom:25px;
opacity:.9;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-bottom:16px;
font-size:15px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:white;
color:#764ba2;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.btn:hover{
transform:translateY(-2px);
}

.error{
background:#ff4d4d;
padding:10px;
margin-bottom:18px;
border-radius:8px;
text-align:center;
}

.register{
text-align:center;
margin-top:20px;
}

.register a{
color:white;
font-weight:bold;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">🔐</div>

<h1>Welcome Back</h1>

<p class="subtitle">
Login to RecipeHub
</p>

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<input
type="text"
name="username"
placeholder="👤 Username"
required>

<input
type="password"
name="password"
placeholder="🔒 Password"
required>

<button class="btn">

Login 🚀

</button>

</form>

<div class="register">

Don't have an account?

<a href="/accounts/register/">

Register

</a>

</div>

</div>

</body>
</html>
