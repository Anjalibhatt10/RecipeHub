<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RecipeHub | Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#11998e,#38ef7d);
}

.card{
    width:450px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:40px;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,.25);
}

.logo{
    text-align:center;
    font-size:60px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    opacity:.9;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:16px;
}

input,
select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:15px;
    outline:none;
}

input:focus,
select:focus{
    box-shadow:0 0 10px rgba(255,255,255,.5);
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:white;
    color:#11998e;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

.error{
    background:#ff4d4d;
    color:white;
    padding:10px;
    border-radius:8px;
    margin-bottom:18px;
    text-align:center;
}

.login-link{
    margin-top:20px;
    text-align:center;
}

.login-link a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
🍽️
</div>

<h1>Create Account</h1>

<p class="subtitle">
Join RecipeHub Today
</p>

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<div class="form-group">

<input
type="text"
name="username"
placeholder="👤 Username"
required>

</div>

<div class="form-group">

<input
type="email"
name="email"
placeholder="📧 Email"
required>

</div>

<div class="form-group">

<select name="role">

<option value="User">
👤 User
</option>

<option value="Creator">
👨‍🍳 Creator
</option>

</select>

</div>

<div class="form-group">

<input
type="password"
name="password"
placeholder="🔒 Password"
required>

</div>

<div class="form-group">

<input
type="password"
name="confirm_password"
placeholder="🔒 Confirm Password"
required>

</div>

<button class="btn" type="submit">

Create Account 🚀

</button>

</form>

<div class="login-link">

Already have an account?

<a href="/accounts/login/">

Login

</a>

</div>

</div>

</body>
</html>
